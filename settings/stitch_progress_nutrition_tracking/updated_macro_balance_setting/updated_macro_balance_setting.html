<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33c758",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Macro Balance - Tadlock</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-950 shadow-xl">
<!-- Header -->
<header class="flex items-center px-4 py-6">
<button class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold ml-2">Macro balance</h1>
</header>
<!-- Main Content -->
<main class="flex-1 px-6 pb-8">
<!-- Hero Donut Chart Section -->
<div class="flex flex-col items-center justify-center py-10">
<div class="relative size-64 flex items-center justify-center">
<!-- SVG Donut Chart -->
<svg class="size-full -rotate-90" viewbox="0 0 36 36">
<!-- Carbs Segment (35%) -->
<circle class="stroke-cyan-500" cx="18" cy="18" fill="none" r="16" stroke-dasharray="35 100" stroke-dashoffset="0" stroke-width="3"></circle>
<!-- Fats Segment (30%) -->
<circle class="stroke-amber-500" cx="18" cy="18" fill="none" r="16" stroke-dasharray="30 100" stroke-dashoffset="-35" stroke-width="3"></circle>
<!-- Protein Segment (35%) -->
<circle class="stroke-primary" cx="18" cy="18" fill="none" r="16" stroke-dasharray="35 100" stroke-dashoffset="-65" stroke-width="3"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="text-4xl font-bold">100%</span>
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Daily Total</span>
</div>
</div>
<!-- Simple Legend -->
<div class="flex gap-6 mt-8">
<div class="flex items-center gap-2">
<div class="size-3 rounded-full bg-cyan-500"></div>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Carbs</span>
</div>
<div class="flex items-center gap-2">
<div class="size-3 rounded-full bg-amber-500"></div>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Fats</span>
</div>
<div class="flex items-center gap-2">
<div class="size-3 rounded-full bg-primary"></div>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Protein</span>
</div>
</div>
</div>
<!-- Detail Sliders -->
<div class="space-y-8 mt-4">
<!-- Carbs Slider -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Carbs</span>
<span class="text-base font-medium">35% <span class="text-slate-400 font-normal ml-1">(199g, 796 kcal)</span></span>
</div>
<span class="text-cyan-600 font-bold">35</span>
</div>
<div class="relative h-2 w-full bg-cyan-100 dark:bg-cyan-950 rounded-full">
<div class="absolute top-0 left-0 h-full w-[35%] bg-cyan-500 rounded-full"></div>
<div class="absolute top-1/2 left-[35%] -translate-y-1/2 -translate-x-1/2 size-5 bg-white border-2 border-cyan-500 rounded-full shadow-md"></div>
</div>
</div>
<!-- Fats Slider -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Fats</span>
<span class="text-base font-medium">30% <span class="text-slate-400 font-normal ml-1">(76g, 684 kcal)</span></span>
</div>
<span class="text-amber-600 font-bold">30</span>
</div>
<div class="relative h-2 w-full bg-amber-100 dark:bg-amber-950 rounded-full">
<div class="absolute top-0 left-0 h-full w-[30%] bg-amber-500 rounded-full"></div>
<div class="absolute top-1/2 left-[30%] -translate-y-1/2 -translate-x-1/2 size-5 bg-white border-2 border-amber-500 rounded-full shadow-md"></div>
</div>
</div>
<!-- Protein Slider -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Proteins</span>
<span class="text-base font-medium">35% <span class="text-slate-400 font-normal ml-1">(200g, 800 kcal)</span></span>
</div>
<span class="text-primary font-bold">35</span>
</div>
<div class="relative h-2 w-full bg-primary/20 dark:bg-primary/10 rounded-full">
<div class="absolute top-0 left-0 h-full w-[35%] bg-primary rounded-full"></div>
<div class="absolute top-1/2 left-[35%] -translate-y-1/2 -translate-x-1/2 size-5 bg-white border-2 border-primary rounded-full shadow-md"></div>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-6 mt-auto">
<button class="w-full bg-primary hover:bg-primary/90 font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20 active:scale-[0.98] text-black">
<span class="material-symbols-outlined text-[20px]">lock</span>
                Update macro balance
            </button>
<p class="text-center text-xs text-slate-400 mt-4">Settings are locked to your current meal plan</p>
</footer>
</div>
</body></html>
