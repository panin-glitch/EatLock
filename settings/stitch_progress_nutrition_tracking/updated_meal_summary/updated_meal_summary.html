<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33c758",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Header -->
<header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center justify-between">
<button class="flex items-center justify-center p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Meal Summary</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-md mx-auto p-4 space-y-6">
<!-- Hero Meal Card -->
<div class="bg-white rounded-xl shadow-sm border border-primary/5 overflow-hidden">
<div class="p-6 flex justify-center bg-slate-50">
<div class="relative w-56 h-36 flex items-center justify-center">
<!-- 'After' Image (Bottom card) -->
<div class="absolute top-4 right-4 w-40 h-28 bg-white rounded-lg shadow-sm border border-slate-100 overflow-hidden transform rotate-2 z-0 opacity-80">
<div class="w-full h-full bg-slate-200" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCuz463c7iKNrhVJuM7FVkSa8iohaaklTarelAAQulqmxHtkelBvC3v9wgMCIjK5sZlZgy0lVz-1Zy_f5QpoHPkWitk9MoO5uNTx-wT61PIz0exIw4nz1S-KrVPinSNMn0XgFqVZgf_gHskenIDkL-fNwL_vimk_FZegM8-1TjtvGHNOHGSEQ52r5jQtQtr554ziwcqHf19K4wQbKiAC4UUX3hj07RGrii5rwzq5PLWo3XjaiGE5d63sjOavG5LLuCgxqZ4HiTUkIKW"); background-size: cover; background-position: center; filter: grayscale(30%);'>
<div class="absolute bottom-1 right-2 bg-black/40 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase">After</div>
</div>
</div>
<!-- 'Before' Image (Top card) -->
<div class="absolute top-2 left-4 w-40 h-28 bg-white rounded-lg shadow-xl border border-slate-100 overflow-hidden transform -rotate-1 z-10">
<div class="w-full h-full bg-slate-200" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCuz463c7iKNrhVJuM7FVkSa8iohaaklTarelAAQulqmxHtkelBvC3v9wgMCIjK5sZlZgy0lVz-1Zy_f5QpoHPkWitk9MoO5uNTx-wT61PIz0exIw4nz1S-KrVPinSNMn0XgFqVZgf_gHskenIDkL-fNwL_vimk_FZegM8-1TjtvGHNOHGSEQ52r5jQtQtr554ziwcqHf19K4wQbKiAC4UUX3hj07RGrii5rwzq5PLWo3XjaiGE5d63sjOavG5LLuCgxqZ4HiTUkIKW"); background-size: cover; background-position: center;'>
<div class="absolute bottom-1 right-2 bg-primary text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase">Before</div>
</div>
</div>
</div>
</div>
<div class="p-5">
<div class="flex items-start justify-between mb-4">
<div>
<h2 class="text-xl font-bold text-slate-900">Grilled Chicken Salad</h2>
<p class="text-slate-500 text-sm">Portion: 1 bowl (350g)</p>
</div>
<button class="bg-primary/10 text-primary p-2 rounded-lg flex items-center gap-1 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
<span class="text-xs font-bold uppercase tracking-wider">Edit</span>
</button>
</div>
<!-- Nutrients Grid -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-background-light p-4 rounded-lg border border-primary/5">
<p class="text-slate-500 text-xs font-medium uppercase tracking-tight">Calories</p>
<p class="text-xl font-bold text-slate-900">450 <span class="text-xs font-normal text-slate-400">kcal</span></p>
</div>
<div class="bg-background-light p-4 rounded-lg border border-primary/5">
<p class="text-slate-500 text-xs font-medium uppercase tracking-tight">Protein</p>
<p class="text-xl font-bold text-slate-900">35<span class="text-xs font-normal text-slate-400">g</span></p>
</div>
<div class="bg-background-light p-4 rounded-lg border border-primary/5">
<p class="text-slate-500 text-xs font-medium uppercase tracking-tight">Carbs</p>
<p class="text-xl font-bold text-slate-900">12<span class="text-xs font-normal text-slate-400">g</span></p>
</div>
<div class="bg-background-light p-4 rounded-lg border border-primary/5">
<p class="text-slate-500 text-xs font-medium uppercase tracking-tight">Fat</p>
<p class="text-xl font-bold text-slate-900">18<span class="text-xs font-normal text-slate-400">g</span></p>
</div>
</div>
</div>
</div>
<!-- Focus Section -->
<section class="space-y-3">
<h3 class="text-slate-900 font-bold text-base px-1">Were you distracted while eating?</h3>
<div class="bg-white p-5 rounded-xl border border-primary/5 shadow-sm">
<div class="space-y-6">
<div class="flex justify-between items-center">
<span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Distraction Level</span>
<span class="text-primary font-bold text-sm bg-primary/10 px-3 py-1 rounded-full transition-all" id="slider-value">Medium</span>
</div>
<div class="px-2 relative pt-2">
<input class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-primary" max="2" min="0" oninput="const vals=['Poor','Medium','Great']; document.getElementById('slider-value').innerText = vals[this.value];" step="1" type="range" value="1"/>
</div>
<div class="flex justify-between px-1">
<span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Poor</span>
<span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Medium</span>
<span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Great</span>
</div>
</div>
</div>
</section>
<!-- Verdict Section -->
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg shadow-xl shadow-slate-200 hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                LOG MEAL
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
</body></html>
