<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Streak Achievement Screen</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-background">
    /* Custom gradient to match the dramatic spotlight effect in the image */
    .spotlight-gradient {
      background: radial-gradient(circle at 50% 100%, rgba(255, 165, 0, 1) 0%, rgba(255, 140, 0, 0.8) 30%, rgba(13, 13, 13, 1) 60%);
      background-color: #0D0D0D;
    }

    /* Dramatic glow effect for the mid-section */
    .glow-container {
      position: relative;
      overflow: hidden;
    }
    
    .glow-container::after {
      content: "";
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 150%;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(255, 230, 150, 0.3) 0%, rgba(255, 140, 0, 0) 70%);
      pointer-events: none;
    }
  </style>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .streak-number {
      font-size: 10rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }
  </style>
</head>
<body class="bg-[#0D0D0D] text-white antialiased">
<!-- BEGIN: MainContainer -->
<main class="relative h-screen w-full max-w-[448px] mx-auto overflow-hidden flex flex-col spotlight-gradient">
<!-- BEGIN: StatusBar -->
<!-- END: StatusBar -->
<!-- BEGIN: StreakContent -->
<section class="flex-1 flex flex-col items-center justify-center px-6 mt-[-40px]" data-purpose="streak-display">
<!-- Large Number Display -->
<h1 class="streak-number font-extrabold text-white drop-shadow-2xl">6</h1>
<p class="text-3xl font-medium -mt-2 tracking-tight">day streak!</p>
<!-- Week Progress Section -->
<div class="mt-16 w-full max-w-sm" data-purpose="weekly-progress">
<div class="flex justify-between mb-2 px-1">
<span class="text-xs font-semibold opacity-80 w-8 text-center">S</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">M</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">T</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">W</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">T</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">F</span>
<span class="text-xs font-semibold opacity-80 w-8 text-center">S</span>
</div>
<!-- Checkmark Row -->
<div class="flex justify-between">
<!-- Sunday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Monday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Tuesday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Wednesday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Thursday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Friday: Completed -->
<div class="w-8 h-8 rounded-full bg-[#E65100] flex items-center justify-center shadow-lg">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<!-- Saturday: Pending -->
<div class="w-8 h-8 rounded-full bg-[#1A1A1A] flex items-center justify-center">
<!-- Empty state circle -->
</div>
</div>
</div>
<!-- Encouragement Text -->
<div class="mt-12 text-center px-10" data-purpose="encouragement-text">
<p class="text-lg font-medium leading-tight">
          That's almost a week of showing up! Keep that same energy.
        </p>
</div>
</section>
<!-- END: StreakContent -->
<!-- BEGIN: ActionArea -->
<footer class="p-8 pb-12" data-purpose="navigation-footer">
<button class="w-full bg-white text-black py-4 rounded-2xl text-xl font-bold shadow-xl active:scale-95 transition-transform" type="button">
        Continue
      </button>
</footer>
<!-- END: ActionArea -->
</main>
<!-- END: MainContainer -->
</body></html>
