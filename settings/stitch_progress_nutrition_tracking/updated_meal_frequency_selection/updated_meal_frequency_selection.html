<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#33c758",
                "background-light": "#ffffff",
                "background-dark": "#131f16",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Tadlock - Meal Frequency</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Meal Frequency</h2>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center px-6 py-8">
<!-- Mascot Section -->
<!-- Vertical Number Picker -->
<div class="text-center px-4 mb-8">
<p class="text-slate-600 dark:text-slate-400 text-base font-medium leading-relaxed">
    We will send you notifications based on your frequency
  </p>
</div><div class="flex-1 w-full flex flex-col items-center justify-center space-y-2">
<div class="text-slate-300 dark:text-slate-600 text-3xl font-semibold opacity-40">1</div>
<div class="text-slate-400 dark:text-slate-500 text-4xl font-semibold opacity-60">2</div>
<!-- Selected State -->
<div class="relative py-4 w-full max-w-[200px] flex justify-center items-center">
<div class="absolute inset-0 bg-primary/5 dark:bg-primary/10 rounded-xl -z-10 border border-primary/20"></div>
<div class="text-slate-900 dark:text-slate-100 text-6xl font-bold">3</div>
</div>
<div class="text-slate-400 dark:text-slate-500 text-4xl font-semibold opacity-60">4</div>
<div class="text-slate-300 dark:text-slate-600 text-3xl font-semibold opacity-40">5</div>
</div>
<!-- Action Button -->
<div class="w-full max-w-xs mt-10">
<button class="w-full bg-primary hover:bg-primary/90 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-primary/20 text-black">
<span class="material-symbols-outlined">check_circle</span>
<span>Done</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
</body></html>
