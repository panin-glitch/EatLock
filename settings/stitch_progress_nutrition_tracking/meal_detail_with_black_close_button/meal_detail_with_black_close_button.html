<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33c758",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Hero Image Section -->
<!-- Content Card -->
<div class="relative flex-1 bg-white dark:bg-slate-900 rounded-t-xl shadow-2xl z-10 flex flex-col items-stretch pt-8">
<!-- Pull Handle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="px-6 py-4">
<!-- Meal Info -->
<div class="text-center mb-6">
<span class="text-primary text-sm font-bold uppercase tracking-wider" style="">Breakfast</span>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mt-2" style="">Kiwi Smoothie Bowl with Granola<span class="material-symbols-outlined text-primary text-lg ml-2 align-middle cursor-pointer">edit</span></h1>
</div>
<!-- Portion Selector -->
<div class="flex items-center justify-between bg-background-light dark:bg-slate-800 rounded-lg p-4 mb-8">
<div class="flex items-center gap-3">
<div class="text-primary bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined block" style="">restaurant</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium" style="">Portion Size</span>
</div>
<div class="flex items-center gap-4">
<button class="w-8 h-8 flex items-center justify-center rounded-full border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400" style="">
<span class="material-symbols-outlined text-xl" style="">remove</span>
</button>
<span class="text-slate-900 dark:text-slate-100 font-bold text-lg" style="">1</span>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-primary text-white" style="">
<span class="material-symbols-outlined text-xl" style="">add</span>
</button>
</div>
</div>
<!-- Nutrition Grid -->
<div class="grid grid-cols-2 gap-4 mb-4">
<!-- Calories -->
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg relative overflow-hidden">
<div class="flex justify-between items-start mb-1">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold" style="">CALORIES</span>
<button class="text-primary text-xs font-bold" style="">EDIT</button>
</div>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100" style="">450</span>
<span class="text-xs text-slate-500" style="">cal</span>
</div>
</div>
<!-- Protein -->
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg relative overflow-hidden">
<div class="flex justify-between items-start mb-1">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold" style="">PROTEIN</span>
<button class="text-primary text-xs font-bold" style="">EDIT</button>
</div>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100" style="">20</span>
<span class="text-xs text-slate-500" style="">g</span>
</div>
</div>
<!-- Carbs -->
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg relative overflow-hidden">
<div class="flex justify-between items-start mb-1">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold" style="">CARBS</span>
<button class="text-primary text-xs font-bold" style="">EDIT</button>
</div>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100" style="">140</span>
<span class="text-xs text-slate-500" style="">g</span>
</div>
</div>
<!-- Fat -->
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg relative overflow-hidden">
<div class="flex justify-between items-start mb-1">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold" style="">FAT</span>
<button class="text-primary text-xs font-bold" style="">EDIT</button>
</div>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100" style="">12</span>
<span class="text-xs text-slate-500" style="">g</span>
</div>
</div>
</div><!-- Meal Context Sections -->
<div class="space-y-4 mb-10">
<!-- Verdict Section -->
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg">
<div class="flex justify-between items-center mb-3">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Verdict</span>
<button class="text-primary text-xs font-bold">EDIT</button>
</div>
<div class="flex justify-around items-center"><div class="flex w-full gap-4">
<button class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg bg-primary/10 text-primary border border-primary/20">
<span class="material-symbols-outlined text-xl">check_circle</span>
<span class="text-xs font-bold uppercase">Verified</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-400 opacity-60">
<span class="material-symbols-outlined text-xl">cancel</span>
<span class="text-xs font-bold uppercase">Not Verified</span>
</button>
</div></div>
</div>
<!-- Distraction & Time Spent -->
<div class="grid grid-cols-2 gap-4 mb-4">
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg"><div class="flex justify-between items-start mb-2">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Rating</span>
<button class="text-primary text-xs font-bold">EDIT</button>
</div>
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-lg">star</span>
</div></div>
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg">
<div class="flex justify-between items-start mb-2">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Time Spent</span>
<button class="text-primary text-xs font-bold">EDIT</button>
</div>
<div class="flex items-center gap-2 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-xl">timer</span>
<span class="text-sm font-bold">15 min</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pb-10">
<button class="w-full font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-black bg-black text-white hover:bg-black/90 shadow-black/20" style="">CLOSE</button>
</div>
</div>
</div>
</div>
</body></html>
