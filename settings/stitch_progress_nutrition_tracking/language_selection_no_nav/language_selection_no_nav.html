<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Language Selection - Tadlock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33c758",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="radio"]:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-slate-900 shadow-xl overflow-hidden">
<!-- Header -->
<header class="flex items-center px-4 py-4 border-b border-slate-100 dark:border-slate-800">
<button class="flex items-center justify-center p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-bold tracking-tight">Language</h1>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 py-6">
<h2 class="text-xs font-bold text-slate-500 dark:text-slate-400 tracking-widest uppercase mb-4 px-1">SELECT LANGUAGE</h2>
<div class="flex flex-col gap-3">
<!-- Language: Deutsch -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all cursor-pointer group">
<span class="text-base font-medium">Deutsch</span>
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent rounded-full transition-colors" name="language" type="radio" value="de"/>
</label>
<!-- Language: English (Selected) -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary bg-primary/5 dark:bg-primary/10 transition-all cursor-pointer group">
<span class="text-base font-semibold text-primary">English</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-bold">check</span>
<input checked="" class="h-6 w-6 border-2 border-primary text-primary focus:ring-primary focus:ring-offset-0 bg-primary rounded-full transition-colors" name="language" type="radio" value="en"/>
</div>
</label>
<!-- Language: Español -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all cursor-pointer group">
<span class="text-base font-medium">Español</span>
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent rounded-full transition-colors" name="language" type="radio" value="es"/>
</label>
<!-- Language: Français -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all cursor-pointer group">
<span class="text-base font-medium">Français</span>
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent rounded-full transition-colors" name="language" type="radio" value="fr"/>
</label>
<!-- Language: Italiano -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all cursor-pointer group">
<span class="text-base font-medium">Italiano</span>
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent rounded-full transition-colors" name="language" type="radio" value="it"/>
</label>
<!-- Language: Português -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all cursor-pointer group">
<span class="text-base font-medium">Português</span>
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent rounded-full transition-colors" name="language" type="radio" value="pt"/>
</label>
</div>
</main>
<!-- Bottom Navigation Bar -->
</div>
</body></html>
